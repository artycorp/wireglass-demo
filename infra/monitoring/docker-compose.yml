services:
  grafana:
    image: grafana/grafana:11.1.4
    container_name: wireglass-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_USERS_DEFAULT_THEME: "light"
      INFLUXDB_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN:-wireglass-dev-token}"
      INFLUXDB_ORG: "${INFLUXDB_ORG:-wireglass}"
      INFLUXDB_BUCKET: "${INFLUXDB_BUCKET:-jmeter}"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - influxdb
      - jaeger
      - opensearch

  influxdb:
    image: influxdb:2.7-alpine
    container_name: wireglass-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USER:-admin}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD:-adminadmin}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN:-wireglass-dev-token}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG:-wireglass}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET:-jmeter}"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: wireglass-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_GRPC_PORT:-14250}:14250"
      - "${JAEGER_HTTP_THRIFT_PORT:-14268}:14268"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: wireglass-opensearch
    restart: unless-stopped
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.14.0
    container_name: wireglass-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      - opensearch

  wireglass-config:
    image: nginx:1.27-alpine
    container_name: wireglass-config
    restart: unless-stopped
    ports:
      - "${WIRECONFIG_PORT:-8090}:80"
    volumes:
      - ./wireglass-config:/usr/share/nginx/html:ro
      - ./wireglass-config/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  grafana-data:
  influxdb-data:
  influxdb-config:
  opensearch-data:
