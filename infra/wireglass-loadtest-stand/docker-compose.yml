services:
  mock:
    build: .
    image: wireglass-loadtest-stand:latest
    container_name: wireglass-loadtest-stand
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
